name: Build Frida Gadget Zygisk Module

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup NDK
        uses: ntt123/setup-ndk@v1
        with:
          ndk-version: r27

      - name: Download Frida Gadget
        run: |
          VERSION=$(curl -s https://api.github.com/repos/frida/frida/releases/latest | grep tag_name | head -1 | cut -d'"' -f4)
          wget -q "https://github.com/frida/frida/releases/download/${VERSION}/frida-gadget-${VERSION}-android-arm64.so.xz"
          xz -d "frida-gadget-${VERSION}-android-arm64.so.xz"
          mv "frida-gadget-${VERSION}-android-arm64.so" libs/libfrida-gadget.so

      - name: Build
        run: |
          mkdir -p build && cd build
          cmake -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
                -DANDROID_ABI=arm64-v8a -DANDROID_PLATFORM=android-21 \
                -DCMAKE_BUILD_TYPE=Release ../src
          make -j$(nproc)

      - name: Package
        run: |
          mkdir -p zygisk/arm64-v8a
          cp build/zygisk/arm64-v8a/zygisk_gadget.so zygisk/arm64-v8a/
          echo '#!/sbin/sh' > customize.sh
          echo 'SKIPUNZIP=0' >> customize.sh
          echo 'ui_print "- Installing Frida Gadget Zygisk module"' >> customize.sh
          chmod 755 customize.sh
          zip -r9 module.zip module.prop customize.sh post-fs-data.sh \
            libs/libfrida-gadget.so libs/frida-gadget.config zygisk/

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: FridaGadgetInject
          path: module.zip
