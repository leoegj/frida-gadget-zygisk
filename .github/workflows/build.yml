name: Build Frida Gadget Zygisk Module

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download NDK
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r27-linux.zip
          unzip -q android-ndk-r27-linux.zip
          echo "ANDROID_NDK_HOME=$PWD/android-ndk-r27" >> $GITHUB_ENV

      - name: Download Frida Gadget
        run: |
          VER=$(curl -s https://api.github.com/repos/frida/frida/releases/latest | grep tag_name | head -1 | cut -d'"' -f4)
          wget -q "https://github.com/frida/frida/releases/download/${VER}/frida-gadget-${VER}-android-arm64.so.xz"
          xz -d "frida-gadget-${VER}-android-arm64.so.xz"
          mv "frida-gadget-${VER}-android-arm64.so" libs/libfrida-gadget.so
          chmod 755 libs/libfrida-gadget.so
          echo "Gadget version: ${VER}" > libs/gadget_version.txt

      - name: Build Zygisk Module
        run: |
          mkdir -p build && cd build
          cmake -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
                -DANDROID_ABI=arm64-v8a -DANDROID_PLATFORM=android-21 \
                -DCMAKE_BUILD_TYPE=Release ../src
          make -j$(nproc)

      - name: Package Module
        run: |
          mkdir -p zygisk/arm64-v8a
          cp build/zygisk/arm64-v8a/zygisk_gadget.so zygisk/arm64-v8a/ || echo "no built file, skipping"
          cat > customize.sh << 'CEOF'
          #!/sbin/sh
          SKIPUNZIP=0
          ui_print "- Installing Frida Gadget Zygisk module"
CEOF
          chmod 755 customize.sh
          zip -r9 module.zip module.prop customize.sh post-fs-data.sh \
            libs/libfrida-gadget.so libs/frida-gadget.config libs/gadget_version.txt \
            zygisk/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FridaGadgetInject
          path: module.zip
